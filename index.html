<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Loja Geek</title>

<style>
body { font-family: Arial; background:#f5f5f5; }
header { background:#111; color:#fff; padding:20px; text-align:center; }
.botao { background:green; color:#fff; padding:10px; cursor:pointer; display:inline-block; margin-top:10px; }
.card { background:#fff; padding:10px; margin:10px; border-radius:10px; display:inline-block; }
</style>
</head>

<body>

<header>
<h1>Minha Loja Geek</h1>
🛒 <span id="contador">0</span>
</header>

<h2>Produtos</h2>

<div class="card">
  <h3>Boneco Naruto</h3>
  <p>R$ 59.90</p>
  <button onclick="comprar('Naruto',59.90)">Comprar</button>
</div>

<div class="card">
  <h3>Goku</h3>
  <p>R$ 89.90</p>
  <button onclick="comprar('Goku',89.90)">Comprar</button>
</div>

<hr>

<h2>Carrinho</h2>

<ul id="lista"></ul>

Total: R$ <span id="total">0</span>

<h3>Dados</h3>

<input id="nome" placeholder="Nome"><br><br>
<input id="email" placeholder="Email"><br><br>
<input id="endereco" placeholder="Endereço"><br><br>

<button class="botao" onclick="finalizar()">💳 Finalizar Compra</button>

<script>

// CARRINHO
let carrinho = [];

function comprar(nome, preco){
  let item = carrinho.find(i=>i.nome===nome);

  if(item) item.qtd++;
  else carrinho.push({nome,preco,qtd:1});

  atualizar();
}

function atualizar(){
  let lista = document.getElementById("lista");
  let total = 0;
  let html = "";

  carrinho.forEach(i=>{
    total += i.preco * i.qtd;
    html += `<li>${i.nome} x${i.qtd}</li>`;
  });

  lista.innerHTML = html;
  document.getElementById("total").innerText = total.toFixed(2);
  document.getElementById("contador").innerText = carrinho.length;
}

// PAGAMENTO
function finalizar(){

  let nome = document.getElementById("nome").value;
  let email = document.getElementById("email").value;
  let endereco = document.getElementById("endereco").value;

  if(!nome || !email || !endereco){
    alert("Preencha tudo!");
    return;
  }

  if(carrinho.length === 0){
    alert("Carrinho vazio!");
    return;
  }

  fetch("criar_pagamento.php", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      nome: nome,
      email: email,
      endereco: endereco,
      carrinho: carrinho
    })
  })
  .then(r=>r.json())
  .then(data=>{
    console.log(data);

    if(data.init_point){
      window.location.href = data.init_point;
    }else{
      alert("Erro no pagamento");
    }
  });

}

</script>

</body>
</html>
