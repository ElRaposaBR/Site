<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Loja Geek</title>
</head>
<body>

<header>
  <h1>Minha Loja Geek</h1>
  🛒 Carrinho: <span id="contador">0</span>
</header>

<h2>Produtos</h2>

<section>

  <!-- 🔥 PRODUTO TESTE -->
  <div>
    <h3>Produto Teste</h3>
    <p>R$ 1,00</p>
    <button onclick="comprar('Produto Teste',1.00)">Comprar</button>
  </div>

  <div>
    <h3>Boneco Naruto</h3>
    <p>R$ 59,90</p>
    <button onclick="comprar('Naruto',59.90)">Comprar</button>
  </div>

  <div>
    <h3>Goku</h3>
    <p>R$ 89,90</p>
    <button onclick="comprar('Goku',89.90)">Comprar</button>
  </div>

</section>

<h2>Seus dados</h2>

<input id="nome" placeholder="Nome"><br>
<input id="email" placeholder="Email"><br>

<h2>Carrinho</h2>

<ul id="lista"></ul>
<p>Total: R$ <span id="total">0.00</span></p>

<h3>Frete</h3>

<input id="cep" placeholder="CEP">
<button onclick="calcularFrete()">Calcular</button>

<div id="frete"></div>

<br>
<button onclick="finalizar()">💳 Finalizar Compra</button>

<script>

let carrinho = [];

function comprar(nome, preco){
  let item = carrinho.find(i => i.nome === nome);
  if(item) item.qtd++;
  else carrinho.push({nome,preco,qtd:1});
  atualizar();
}

function atualizar(){

  let lista = document.getElementById("lista");
  let total = 0;

  lista.innerHTML = "";

  carrinho.forEach(item=>{
    total += item.preco * item.qtd;
    lista.innerHTML += `<li>${item.nome} x${item.qtd}</li>`;
  });

  document.getElementById("total").innerText = total.toFixed(2);
  document.getElementById("contador").innerText = carrinho.length;
}

function calcularFrete(){

  let cep = document.getElementById("cep").value;

  fetch("frete.php?cep=" + cep)
  .then(r=>r.json())
  .then(data=>{

    let html = "";

    data.forEach(f=>{
      if(f.price){
        html += `<p>${f.name} - R$ ${f.price}</p>`;
      }
    });

    document.getElementById("frete").innerHTML = html;
  });

}

function finalizar(){

  if(carrinho.length === 0){
    alert("Carrinho vazio");
    return;
  }

  let nome = document.getElementById("nome").value;
  let email = document.getElementById("email").value;
  let endereco = prompt("Digite seu endereço:");

  fetch("criar_pagamento.php",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      nome,
      email,
      endereco,
      carrinho
    })
  })
  .then(r=>r.json())
  .then(data=>{
    if(data.init_point){
      window.location.href = data.init_point;
    } else {
      alert("Erro pagamento");
      console.log(data);
    }
  });

}

</script>

</body>
</html>
